name: Release & Publish

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    name: Publish to Maven Central & GitHub Packages

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Determine release version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
          else
            VERSION=$(grep -oP '(?<=\?\: ")[0-9]+\.[0-9]+\.[0-9]+' build.gradle.kts | head -1)
            TAG="v${VERSION}"
          fi
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-.*)?$ ]]; then
            echo "❌ Tag '$TAG' does not match semver pattern (vX.Y.Z)"
            exit 1
          fi
          echo "RELEASE_VERSION=$TAG" >> $GITHUB_ENV
          echo "✅ Publishing version: $TAG"

      - name: Build
        run: ./gradlew build
        env:
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}

      - name: Drop stale staging repositories
        run: |
          echo "🔍 Searching for stale staging repositories..."
          REPOS=$(curl -s -H "Authorization: Bearer $OSSRH_TOKEN" \
            "https://ossrh-staging-api.central.sonatype.com/manual/search/repositories?ip=any&profile_id=sh.polar")
          echo "$REPOS" | jq .

          echo "$REPOS" | jq -r '.repositories[]?.key // empty' | while read -r KEY; do
            echo "🗑️ Dropping stale repository: $KEY"
            curl -s -X DELETE -H "Authorization: Bearer $OSSRH_TOKEN" \
              "https://ossrh-staging-api.central.sonatype.com/manual/drop/repository/$KEY"
          done
          echo "✅ Cleanup complete"
        env:
          OSSRH_TOKEN: ${{ secrets.OSSRH_TOKEN }}

      - name: Publish to Maven Central (Sonatype OSSRH)
        run: ./gradlew publishMavenJavaPublicationToOSSRHRepository --info
        env:
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
          OSSRH_TOKEN: ${{ secrets.OSSRH_TOKEN }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Upload staging repository to Central Portal
        run: |
          echo "📦 Uploading staging repository to Central Portal..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $OSSRH_TOKEN" \
            "https://ossrh-staging-api.central.sonatype.com/manual/upload/defaultRepository/sh.polar?publishing_type=automatic")

          if [[ "$HTTP_STATUS" -ge 200 && "$HTTP_STATUS" -lt 300 ]]; then
            echo "✅ Staging repository uploaded and will auto-publish to Maven Central"
          else
            echo "❌ Upload failed with HTTP status: $HTTP_STATUS"
            exit 1
          fi
        env:
          OSSRH_TOKEN: ${{ secrets.OSSRH_TOKEN }}

      - name: Publish to GitHub Packages
        run: ./gradlew publishMavenJavaPublicationToGitHubPackagesRepository
        env:
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            sdk/build/libs/*.jar
            polar-spring/build/libs/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
